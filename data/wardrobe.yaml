style_rules:
  - "Always tuck in your top. It defines the waist and looks intentional."
  - "One statement piece per outfit. Let it breathe."
  - "Nails should always be done. Nude, white, or burgundy."
  - "Hair should look intentional, whether it's a sleek bun, blowout, or natural."
  - "Perfume is part of the outfit. Never skip it."
  - "Iron everything. Wrinkles are not an aesthetic."
  - "When presenting or hosting, wear a colour that contrasts with the background."

