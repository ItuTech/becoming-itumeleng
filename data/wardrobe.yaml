# Becoming Itumeleng: Wardrobe Inventory
# Inspired by Olivia Pope's signature style from Scandal
# Power dressing meets modern elegance

aesthetic:
  description: "Clean lines, structured silhouettes, neutral tones with intentional pops of colour. Every outfit should say 'she means business' without trying too hard."
  icons:
    - "Olivia Pope (Scandal)"
    - "Modern power femininity"
  rules:
    - "Quality over quantity. Always."
    - "Fit is everything. Tailoring is non-negotiable."
    - "Neutrals are the foundation. Colour is the accent."
    - "When in doubt, overdress."
    - "Accessories should elevate, not compete."

colour_palette:
  core_neutrals:
    - white
    - cream
    - ivory
    - camel
    - grey
    - charcoal
    - black
    - navy
  accent_colours:
    - burgundy
    - emerald green
    - soft lavender
    - blush pink
    - cobalt blue
    - gold

coats_and_outerwear:
